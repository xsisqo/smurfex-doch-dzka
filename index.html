<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smurfex Dochádzka</title>
  <meta name="theme-color" content="#6ec7ee">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="top-card">
      <img src="logo.png" class="logo" alt="Smurfex s.r.o.">
      <div class="language">
        <button id="btn-sk" onclick="setLang('sk')">SK</button>
        <button id="btn-en" onclick="setLang('en')">EN</button>
      </div>
      <h1 data-i18n="title">Dochádzka</h1>
      <p data-i18n="subtitle" class="subtitle">Jednoduchá evidencia pre pracovníkov</p>
    </section>

    <section class="card">
      <label data-i18n="worker">Meno pracovníka</label>
      <input id="worker" autocomplete="name" data-i18n-placeholder="workerPh" placeholder="napr. Ján Novák">
      <label data-i18n="site">Stavba</label>
      <input id="site" data-i18n-placeholder="sitePh" placeholder="napr. STRABAG / Nitra">
      <div class="actions">
        <button class="arrival" onclick="saveRecord('arrival')" data-i18n="arrival">PRIŠIEL SOM</button>
        <button class="departure" onclick="saveRecord('departure')" data-i18n="departure">ODCHÁDZAM</button>
      </div>
      <p id="message"></p>
    </section>

    <section class="card">
      <h2 data-i18n="records">Záznamy v tomto mobile</h2>
      <div id="recordsList"></div>
      <div class="bottom-actions">
        <button class="export" onclick="exportCSV()" data-i18n="export">Export CSV</button>
        <button class="delete" onclick="clearRecords()" data-i18n="clear">Vymazať</button>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
